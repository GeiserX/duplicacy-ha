<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6522C"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/><line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- House icon (Home Assistant) -->
  <g transform="translate(70, 50)">
    <polygon points="40,10 5,45 15,45 15,80 65,80 65,45 75,45" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <rect x="22" y="50" width="36" height="30" rx="2" fill="#ffffff" opacity="0.15"/>
    <!-- Shield/backup icon inside house -->
    <path d="M40,54 L28,60 L28,70 C28,75 33,79 40,82 C47,79 52,75 52,70 L52,60 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <polyline points="34,67 38,71 46,63" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  </g>

  <text x="195" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Duplicacy for HA
  </text>

  <text x="197" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    Home Assistant integration for backup monitoring
  </text>

  <g transform="translate(760, 45)" opacity="0.15">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#ffffff">sensor:</text>
    <text x="0" y="16" font-family="monospace" font-size="11" fill="#ffffff">  last: "2h ago"</text>
    <text x="0" y="32" font-family="monospace" font-size="11" fill="#ffffff">  size: "1.2 TB"</text>
    <text x="0" y="48" font-family="monospace" font-size="11" fill="#ffffff">  status: "ok"</text>
    <text x="0" y="64" font-family="monospace" font-size="11" fill="#ffffff">  chunks: 48291</text>
  </g>
</svg>
